<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <!-- Fancybox 3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.css" />
    
    <!-- jQuery (требуется для Fancybox) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Fancybox 3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.js"></script>
</head>
<body>
    <div class="Contact">
        <img src="image/div.logo_wrap.png">
        <img src="image/Group 11.png">
        <img src="image/Group 10.png">
    </div>
    <div class="models">
        <div class="left">
            <button>M6</button>
            <button>DARGO X</button>
            <button>DARGO</button>
            <button>JOLION</button>
            <button>F7x</button>
            <button>F7</button>
            <button>H9</button>
            <button>GWM Poer</button>
            <button>GWM Poer KINGKONG</button>
        </div>
        <div class="right">
            <button>ПОДОБРАТЬ КОМПЛЕКТАЦИЮ</button>
            <button>ТЕСТ-ДРАЙВ</button>
            <button>КОНТАКТЫ</button>
        </div>
    </div>
    <div class="Main">
        <img class="backg" src="image/background.jpg">
        <div class="BlackFriday">
            <div class="text">
                <p>Увеличиваем выгоды на HAVAL</p>
                <p style="color:aqua">в Химках к Чёрной пятнице!</p>
            </div>
        </div>
        <button class="BtnBF">ЗАФИКСИРОВАТЬ УСЛОВИЯ</button>
    </div>
    <div class="Timer">
        <div class="cont">
            <p>ОСТАВЬТЕ ЗАЯВКУ И ЗАФИКСИРУЙТЕ УСЛОВИЯ</p>
            <div class="timer-container">
                <div class="timer-item">
                    <div class="circle" style="--percent:100%;">
                        <div class="circle-content">
                            <span class="number">8</span>
                            <span class="label">дней</span>
                        </div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="timer-item">
                    <div class="circle" style="--percent:75%;">
                        <div class="circle-content">
                            <span class="number">8</span>
                            <span class="label">часов</span>
                        </div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="timer-item">
                    <div class="circle" style="--percent:15%;">
                        <div class="circle-content">
                            <span class="number">56</span>
                            <span class="label">минут</span>
                        </div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="timer-item">
                    <div class="circle" style="--percent:45%;">
                        <div class="circle-content">
                            <span class="number">28</span>
                            <span class="label">секунд</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <button class="Btn">ЗАФИКСИРОВАТЬ УСЛОВИЯ</button>
    </div>
    <div class="Menu">
        <img class="FirstPic" src="image/плашка.png">
        <img class="SecondPic" src="image/плашка1.png">
        
        <!-- Первая карточка товара-->

        <div class="Card">
            <div class="Picture">
                <div>
                    <img src="image/Frame2.png">
                    <button class="BtnCard"><img src="image/кнопка.png"></button>
                </div>
                <a href="image/greyCar.png" data-fancybox="gallery-car1">
                    <button class="BtnCar"><img src="image/greyCar.png"></button>
                </a>
                <a href="image/greyCar1.png" data-fancybox="gallery-car1" style="display: none;"></a>
                <a href="image/greyCar2.png" data-fancybox="gallery-car1" style="display: none;"></a>
            </div>
            <div class="Colors">
                <button class="blcol"></button>
                <button class="whcol"></button>
                <button class="grcol"></button>
            </div>
            <div class="Info">
                <button><img src="image/lets-icons_filter.svg">Выгода по госпрограмме</button>
                <button><img src="image/lets-icons_filter3.svg">Максимальные выгоды по трейд-ин</button>
                <button><img src="image/lets-icons_filter1.svg">КАСКО в подарок</button>
                <button><img src="image/lets-icons_filter4.svg">Зимние шины в подарок</button>
                <button><img src="image/lets-icons_filter2.svg">Доп.оборудование на 100 000р в подарок</button>
            </div>
            <div class="BuyCont">
                <button>УЗНАТЬ СТОИМОСТЬ</button>
                <button>РАССЧИТАТЬ КРЕДИТ</button>
                <button>ПОДОБРАТЬ КОМПЛЕКТАЦИЮ</button>
            </div>
        </div>

        <!-- Вторая карточка товара -->

        <div class="Card">
            <div class="Picture">
                <div>
                    <img src="image/Frame21.png">
                    <button class="BtnCard"><img src="image/кнопка.png"></button>
                </div>
                <a href="image/redCar.png" data-fancybox="gallery-car2">
                    <button class="BtnCar"><img src="image/redCar.png"></button>
                </a>
                <a href="image/redCar1.png" data-fancybox="gallery-car2" style="display: none;"></a>
                <a href="image/redCar2.png" data-fancybox="gallery-car2" style="display: none;"></a>
                <a href="image/redCar3.png" data-fancybox="gallery-car2" style="display: none;"></a>
            </div>
            <div class="Colors">
                <button class="blcol"></button>
                <button class="whcol"></button>
                <button class="grcol"></button>
                <button class="redcol"></button>
            </div>
            <div class="Info">
                <button><img src="image/lets-icons_filter.svg">Выгода по госпрограмме</button>
                <button><img src="image/lets-icons_filter3.svg">Максимальные выгоды по трейд-ин</button>
                <button><img src="image/lets-icons_filter1.svg">КАСКО в подарок</button>
                <button><img src="image/lets-icons_filter4.svg">Зимние шины в подарок</button>
                <button><img src="image/lets-icons_filter2.svg">Доп.оборудование на 100 000р в подарок</button>
            </div>
            <div class="BuyCont">
                <button>УЗНАТЬ СТОИМОСТЬ</button>
                <button>РАССЧИТАТЬ КРЕДИТ</button>
                <button>ПОДОБРАТЬ КОМПЛЕКТАЦИЮ</button>
            </div>
        </div>
    </div>
</body>
</html>
